name: Aegis CI/CD Pipeline

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-run: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest httpx pytest-asyncio pyjwt cryptography aiofiles

      - name: Run Linting
        run: |
          pip install flake8
          flake8 backend/app/ || true

      - name: Run Tests
        run: |
          python -m pytest tests/backend/test_ai_api.py || true

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "Mock Docker login"

      - name: Build backend Docker Image
        run: |
          docker build -t aegis-backend:latest ./backend
