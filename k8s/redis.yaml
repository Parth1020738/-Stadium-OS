apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-redis
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-redis
  template:
    metadata:
      labels:
        app: aegis-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-redis
  namespace: aegis
spec:
  ports:
    - port: 6379
  selector:
    app: aegis-redis
