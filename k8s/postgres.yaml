apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aegis-postgres
  namespace: aegis
spec:
  serviceName: aegis-postgres
  replicas: 1
  selector:
    matchLabels:
      app: aegis-postgres
  template:
    metadata:
      labels:
        app: aegis-postgres
    spec:
      containers:
        - name: postgres
          image: ankane/pgvector:latest
          ports:
            - containerPort: 5432
          environment:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: aegis_db
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-postgres
  namespace: aegis
spec:
  ports:
    - port: 5432
  selector:
    app: aegis-postgres
